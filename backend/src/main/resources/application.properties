spring.application.name=library-management-system

# Database Configuration — override via SPRING_DATASOURCE_* env vars on Coolify
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/library_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Explicit dialect lets Hibernate bootstrap without a live DB connection
# (needed when the DB hostname differs from the Docker Compose default).
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Don't fail on startup if DB is momentarily unreachable.
spring.datasource.hikari.initialization-fail-timeout=-1


# Server Configuration
server.port=8080

# CORS is handled by CorsConfig.java (CorsFilter via FilterRegistrationBean)
# which runs before the Spring Security filter chain. Override via ALLOWED_ORIGINS
# env var (comma-separated origins, or * for all).
library.app.allowedorigins=${ALLOWED_ORIGINS:*}

# JWT Configuration
library.jwtSecret=${JWT_SECRET:ChamLibrarySecretKeyChangeMeInProduction1234567890}
library.jwtExpirationMs=86400000

# Seeded admin account (see DataSeeder.java). Override in production.
library.app.adminUsername=${ADMIN_USERNAME:admin}
library.app.adminPassword=${ADMIN_PASSWORD:admin123}
