spring.application.name=library-management-system

# Database Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/library_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# No explicit hibernate.dialect: Hibernate 6 auto-detects the correct MySQL
# dialect from the JDBC connection. The old MySQL8Dialect class is deprecated
# and unnecessary here.

# Server Configuration
server.port=8080

# CORS is handled by CorsConfig.java (CorsFilter via FilterRegistrationBean)
# which runs before the Spring Security filter chain. Override via ALLOWED_ORIGINS
# env var (comma-separated origins, or * for all).
library.app.allowedorigins=${ALLOWED_ORIGINS:*}

# JWT Configuration
library.jwtSecret=${JWT_SECRET:ChamLibrarySecretKeyChangeMeInProduction1234567890}
library.jwtExpirationMs=86400000

# Seeded admin account (see DataSeeder.java). Override in production.
library.app.adminUsername=${ADMIN_USERNAME:admin}
library.app.adminPassword=${ADMIN_PASSWORD:admin123}
