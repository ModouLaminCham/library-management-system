version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: library_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: library_db
      MYSQL_USER: library_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-library_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - library_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-password}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  springboot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library_springboot
    restart: unless-stopped
    ports:
      - "8084:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/library_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-ChamLibrarySecretKeyChangeMeInProduction1234567890}
      LIBRARY_APP_ALLOWEDORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      LIBRARY_APP_ADMINUSERNAME: ${ADMIN_USERNAME:-admin}
      LIBRARY_APP_ADMINPASSWORD: ${ADMIN_PASSWORD:-admin123}
    networks:
      - library_network

  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    container_name: library_react
    restart: unless-stopped
    ports:
      - "3004:3000"
    depends_on:
      - springboot
    networks:
      - library_network

volumes:
  mysql_data:

networks:
  library_network:
    driver: bridge
